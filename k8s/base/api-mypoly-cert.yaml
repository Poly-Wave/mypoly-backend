apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-mypoly-kro-kr
  namespace: mypoly
spec:
  secretName: api-mypoly-kro-kr-tls
  privateKey:
    rotationPolicy: Always  # 또는 Never (키 고정하고 싶으면)
  issuerRef:
    name: letsencrypt-prod   # 처음엔 staging 으로 임시조치, 추후 prod로 변경 후 실제 인증서 생성
    kind: ClusterIssuer
  dnsNames:
    - api-mypoly.kro.kr