apiVersion: v1
kind: ConfigMap
metadata:
  name: bill-batch-config
  namespace: mypoly
data:
  DB_HOST: "mypoly-postgres"
  DB_PORT: "5432"
  DB_SCHEMA: "bill_service"

  BILL_BATCH_JOB_TYPE: "DAILY_BILL_PIPELINE"
  BILL_BATCH_TRIGGER_TYPE: "CRON"

  BILL_API_BASE_URL: "https://apis.data.go.kr/9710000/BillInfoService2"
  BILL_START_ORD: "22"
  BILL_END_ORD: "22"

  BILL_BATCH_PAGE_SIZE: "100"
  BILL_BATCH_MAX_PAGES: "300"
  BILL_BATCH_REQUEST_TIMEOUT_SEC: "30"
  BILL_BATCH_SLEEP_MS: "150"
  BILL_BATCH_AI_SLEEP_MS: "1000"

  BILL_BATCH_MAX_AI_PER_RUN: "200"
  BILL_BATCH_AI_MAX_RETRY_COUNT: "3"
  BILL_BATCH_AI_RETRY_WAIT_MINUTES: "60"
  BILL_BATCH_AI_PROCESSING_TIMEOUT_MINUTES: "30"
  BILL_BATCH_AI_QUOTA_RETRY_WAIT_MINUTES: "720"

  MIN_PROPOSAL_DATE: "2026-01-01"

  GEMINI_MODEL: "gemini-2.5-flash"
  GEMINI_TEMPERATURE: "0.2"
  PROMPT_VERSION: "v1-mypoly-17cats"

  IMAGE_TAG: "0.1"
  GIT_COMMIT_SHA: "manual"