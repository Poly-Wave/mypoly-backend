apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: mypoly
data:
  # Spring profile (dev/prod는 overlay에서 patch)
  SPRING_PROFILES_ACTIVE: "local"

  SERVER_PORT: "8080"

  # Ingress/Reverse proxy 환경에서 OAuth2 redirect baseUrl이 올바르게 잡히도록
  SERVER_FORWARD_HEADERS_STRATEGY: "framework"
