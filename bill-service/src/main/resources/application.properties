spring.application.name=bill-service

server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL DB 연결 정보
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA 옵션: Flyway가 DDL 책임지고, Hibernate는 검증만
spring.jpa.hibernate.ddl-auto=validate

# (MSA) bill-service 전용 schema 고정
spring.jpa.properties.hibernate.default_schema=bill_service

# MSA/분산환경 시간 사고 방지: Hibernate JDBC timezone 고정(UTC)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway 활성화
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=bill_service
spring.flyway.schemas=bill_service
spring.flyway.create-schemas=true

### Actuator(Health) 정책
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# user-service URL (로컬: localhost:8080, Docker/K8s: http://user-service:80)
user-service.url=${USER_SERVICE_URL:http://user-service:80/users/}
user-service.internal-url=${USER_SERVICE_INTERNAL_URL:http://user-service:80/users}

### Swagger 기본 비활성(로컬 profile에서만 활성 권장)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Bill category icon base url (GCS)
bill.category.icon-base-url=${BILL_CATEGORY_ICON_BASE_URL:https://storage.googleapis.com/mypoly-assets-dev}