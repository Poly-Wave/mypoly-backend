spring.application.name=user-service
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=user_service
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=user_service
spring.flyway.schemas=user_service
spring.flyway.create-schemas=true

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Swagger 기본 비활성(로컬 profile에서만 활성 권장)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# 소셜 로그인(토큰 검증 방식) 옵션
social.dev-auth.enabled=false
social.dev-auth.key=${DEV_AUTH_KEY:}

# Kakao (aud 비슷한 검증용 app_id 옵션)
social.kakao.expected-app-id=${KAKAO_APP_ID:}

# Google/Apple (템플릿: ID_TOKEN 검증용, 확정되면 env 세팅)
social.google.client-id=${GOOGLE_CLIENT_ID:}
social.apple.client-id=${APPLE_CLIENT_ID:}

# Google ID token aud 허용 목록(콤마 구분)
social.google.allowed-audiences=${GOOGLE_ALLOWED_AUDIENCES:}